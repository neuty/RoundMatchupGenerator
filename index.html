<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchup Generator</title>
<script>
  // Set theme before first paint to avoid flash
  (function() {
    const saved = localStorage.getItem('theme')
    const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
    document.documentElement.setAttribute('data-theme', saved || preferred)
  })()
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #f1f5f9;
    --surface:      #ffffff;
    --border:       #e2e8f0;
    --primary:      #4f46e5;
    --primary-dark: #3730a3;
    --green:        #059669;
    --green-bg:     #ecfdf5;
    --green-mid:    #d1fae5;
    --green-border: #6ee7b7;
    --amber:        #b45309;
    --amber-bg:     #fffbeb;
    --amber-border: #fcd34d;
    --text:         #0f172a;
    --text-2:       #475569;
    --text-3:       #94a3b8;
    --radius:       16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    background: #0c0f1a;
    padding: 1.1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.85rem;
    position: relative;
    overflow: hidden;
  }

  /* Decorative circles */
  header::before,
  header::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  header::before {
    width: 180px; height: 180px;
    border: 28px solid rgba(255,255,255,0.04);
    right: -50px; top: -70px;
  }
  header::after {
    width: 110px; height: 110px;
    border: 18px solid rgba(255,255,255,0.03);
    right: 80px; top: -40px;
  }

  .header-icon {
    width: 38px; height: 38px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(79,70,229,0.45);
    position: relative; z-index: 1;
  }

  .header-title {
    position: relative; z-index: 1;
    line-height: 1;
  }

  .header-title strong {
    display: block;
    font-size: 1.05rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    color: #fff;
  }

  .header-title span {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  /* ── Container ── */
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.5rem;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 4px 20px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-3);
    margin-bottom: 1.1rem;
  }

  /* ── Inputs ── */
  input[type="number"],
  input[type="text"] {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.55rem 0.85rem;
    font-size: 1rem;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    min-height: 44px;
  }

  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    background: var(--surface);
  }

  /* ── Buttons ── */
  .btn {
    border: none;
    border-radius: 10px;
    padding: 0.6rem 1.25rem;
    font-size: 0.88rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 44px;
    touch-action: manipulation;
    letter-spacing: -0.01em;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(79,70,229,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .btn-primary:hover {
    background: var(--primary-dark);
    box-shadow: 0 4px 14px rgba(79,70,229,0.4);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); box-shadow: none; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text-2);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg); color: var(--text); }

  /* ── Setup ── */
  .setting-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.9rem;
  }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-row label { font-size: 0.88rem; font-weight: 500; color: var(--text-2); min-width: 9.5rem; }
  .setting-row input[type="number"] { width: 5rem; }

  .player-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    min-height: 2.5rem;
    margin-bottom: 0.85rem;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    background: #eef2ff;
    color: var(--primary);
    border-radius: 999px;
    padding: 0.3rem 0.5rem 0.3rem 0.85rem;
    font-size: 0.84rem;
    font-weight: 600;
    border: 1px solid #c7d2fe;
  }

  .chip-remove {
    background: none;
    border: none;
    color: #a5b4fc;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0.1rem 0.25rem;
    touch-action: manipulation;
    border-radius: 999px;
    transition: color 0.1s, background 0.1s;
  }
  .chip-remove:hover { color: var(--primary); background: #c7d2fe; }

  .input-row { display: flex; gap: 0.5rem; }
  .input-row input { flex: 1; }

  .seed-input-group {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .seed-text-input {
    width: 7.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
  }
  .seed-refresh {
    padding: 0.3rem 0.55rem;
    font-size: 1.05rem;
    line-height: 1;
    height: auto;
  }
  .seed-badge {
    font-size: 0.68rem;
    color: var(--text-3);
    letter-spacing: 0.06em;
    font-family: 'Courier New', monospace;
    margin-top: 0.15rem;
  }
  .seed-badge strong { color: var(--text-2); font-weight: 700; }

  .setup-actions {
    margin-top: 1.5rem;
    display: flex;
    justify-content: flex-end;
  }

  /* ── Game — round header ── */
  .round-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    gap: 1rem;
  }

  .round-meta { line-height: 1; }

  .round-label {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-3);
    margin-bottom: 0.1rem;
  }

  .round-number {
    font-size: 4rem;
    font-weight: 900;
    letter-spacing: -0.05em;
    color: var(--text);
    line-height: 1;
  }

  .round-actions { display: flex; gap: 0.5rem; align-items: center; }

  /* ── Court cards ── */
  .courts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.85rem;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .court-card {
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid var(--green-border);
    animation: slideIn 0.22s ease both;
    background: var(--green-bg);
  }
  .court-card:nth-child(2) { animation-delay: 0.05s; }
  .court-card:nth-child(3) { animation-delay: 0.10s; }
  .court-card:nth-child(4) { animation-delay: 0.15s; }

  .court-header {
    background: var(--green-mid);
    border-bottom: 1.5px solid var(--green-border);
    padding: 0.45rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }

  .court-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .court-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--green);
  }

  /* SVG court lines motif */
  .court-lines {
    display: block;
    width: 100%;
    height: 6px;
    opacity: 0.35;
  }

  .court-body {
    padding: 0.85rem 1rem 1rem;
  }

  .matchup-row {
    display: flex;
    align-items: stretch;
    gap: 0.5rem;
  }

  .team-box {
    flex: 1;
    background: var(--surface);
    border-radius: 9px;
    padding: 0.65rem 0.75rem;
    text-align: center;
    font-weight: 700;
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .vs-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 2.1rem;
    flex-shrink: 0;
    font-size: 0.58rem;
    font-weight: 900;
    letter-spacing: 0.06em;
    color: var(--green);
    background: rgba(5,150,105,0.12);
    border-radius: 8px;
    border: 1px solid rgba(5,150,105,0.2);
  }

  /* Resting notice */
  .resting-notice {
    margin-top: 1rem;
    background: var(--amber-bg);
    border: 1.5px solid var(--amber-border);
    border-radius: 10px;
    padding: 0.6rem 1rem;
    font-size: 0.85rem;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .resting-icon {
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  /* ── History ── */
  details summary {
    cursor: pointer;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-3);
    padding: 0.2rem 0;
    user-select: none;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  details summary::before {
    content: '▶';
    font-size: 0.5rem;
    transition: transform 0.15s;
    display: inline-block;
  }
  details[open] summary::before { transform: rotate(90deg); }

  .history-list { margin-top: 0.9rem; }

  .history-row {
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.83rem;
    color: var(--text-2);
    line-height: 1.55;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0.2rem 0.5rem;
  }
  .history-row:last-child { border-bottom: none; }

  .history-pill {
    display: inline-flex;
    align-items: center;
    background: #eef2ff;
    color: var(--primary);
    border-radius: 999px;
    padding: 0.1rem 0.55rem;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .history-rest {
    color: var(--amber);
    font-size: 0.8rem;
    font-style: italic;
  }

  /* ── Theme toggle button ── */
  .theme-toggle {
    margin-left: auto;
    background: none;
    border: 1.5px solid rgba(255,255,255,0.14);
    border-radius: 8px;
    color: rgba(255,255,255,0.45);
    padding: 0.45rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    touch-action: manipulation;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.06);
  }

  /* ── Colour transitions ── */
  body, header, .card, .btn, .chip, .court-card, .court-header,
  .team-box, .vs-badge, .resting-notice, .history-pill,
  input[type="text"], input[type="number"] {
    transition: background-color 0.25s ease, border-color 0.25s ease,
                color 0.25s ease, box-shadow 0.25s ease;
  }

  /* ── Dark mode — Solarpunk ─────────────────────────────────────────────
     Deep forest greens + solar lime (actions) + electric cyan (sport).
     Lime (#a3e635) = energy / player actions
     Cyan (#22d3ee) = technology / court indicators
  ─────────────────────────────────────────────────────────────────────── */
  [data-theme="dark"] {
    --bg:           #080f0a;
    --surface:      #0d1f12;
    --border:       #1a3823;
    --primary:      #a3e635;
    --primary-dark: #84cc16;
    --green:        #34d399;
    --green-bg:     #0a1e12;
    --green-mid:    #0f2919;
    --green-border: #1a4d2e;
    --amber:        #fbbf24;
    --amber-bg:     #100900;
    --amber-border: #5c3200;
    --text:         #ecfdf5;
    --text-2:       #86efac;
    --text-3:       #4ade80;
    --neon:         #22d3ee;
  }

  [data-theme="dark"] header { background: #030706; }

  [data-theme="dark"] .header-icon {
    background: var(--primary);
    box-shadow: 0 2px 10px rgba(163,230,53,0.4);
  }

  [data-theme="dark"] .header-icon svg line,
  [data-theme="dark"] .header-icon svg rect {
    stroke: #0a160d;
  }

  [data-theme="dark"] .round-number { color: var(--primary); }

  [data-theme="dark"] .btn-primary {
    background: var(--primary);
    color: #0a160d;
    box-shadow: 0 2px 8px rgba(163,230,53,0.28), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  [data-theme="dark"] .btn-primary:hover {
    background: var(--primary-dark);
    box-shadow: 0 4px 14px rgba(163,230,53,0.38);
  }
  [data-theme="dark"] .btn-secondary {
    background: var(--surface);
    color: var(--text-2);
    border-color: var(--border);
  }
  [data-theme="dark"] .btn-secondary:hover { background: #112016; color: var(--text); }

  [data-theme="dark"] input[type="text"],
  [data-theme="dark"] input[type="number"] {
    background: #0a1a0d;
    color: var(--text);
    border-color: var(--border);
  }
  [data-theme="dark"] input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(163,230,53,0.14);
    background: var(--surface);
  }

  [data-theme="dark"] .chip {
    background: rgba(163,230,53,0.09);
    color: var(--primary);
    border-color: rgba(163,230,53,0.22);
  }
  [data-theme="dark"] .chip-remove { color: rgba(163,230,53,0.45); }
  [data-theme="dark"] .chip-remove:hover {
    color: var(--primary);
    background: rgba(163,230,53,0.14);
  }

  [data-theme="dark"] .vs-badge {
    color: var(--neon);
    background: rgba(34,211,238,0.08);
    border-color: rgba(34,211,238,0.2);
  }
  [data-theme="dark"] .court-dot { background: var(--neon); }
  [data-theme="dark"] .court-label { color: var(--neon); }
  [data-theme="dark"] .court-card {
    border-color: rgba(34,211,238,0.18);
    box-shadow: 0 0 0 1px rgba(34,211,238,0.06), 0 4px 16px rgba(34,211,238,0.04);
  }

  [data-theme="dark"] .history-pill {
    background: rgba(34,211,238,0.1);
    color: var(--neon);
  }
  [data-theme="dark"] .history-rest { color: var(--amber); }

  [data-theme="dark"] .theme-toggle {
    border-color: rgba(163,230,53,0.2);
    color: rgba(163,230,53,0.5);
  }
  [data-theme="dark"] .theme-toggle:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(163,230,53,0.07);
  }

  /* ── Reset confirmation modal ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .modal-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.22);
    transform: translateY(10px) scale(0.96);
    transition: transform 0.22s ease;
  }
  .modal-backdrop.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  .modal-body {
    font-size: 0.875rem;
    color: var(--text-2);
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }
  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  /* Warm "No" — prominent, orange, impossible to miss */
  .btn-warm {
    background: #f97316;
    color: #fff;
    box-shadow: 0 2px 10px rgba(249,115,22,0.38);
    font-size: 0.95rem;
  }
  .btn-warm:hover {
    background: #ea580c;
    box-shadow: 0 4px 16px rgba(249,115,22,0.48);
    transform: translateY(-1px);
  }
  .btn-warm:active { transform: translateY(0); box-shadow: none; }

  /* Quiet "Yes, reset" */
  .btn-ghost {
    background: transparent;
    color: var(--text-3);
    border: 1.5px solid var(--border);
    font-size: 0.84rem;
  }
  .btn-ghost:hover { background: var(--bg); color: var(--text-2); }

  [data-theme="dark"] .modal {
    box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
  }

  /* ── Export modal ── */
  .export-modal {
    max-width: 620px;
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 82vh;
  }
  .export-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 1.4rem 0.9rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .export-modal-header .modal-title { margin-bottom: 0; }
  .modal-close-btn {
    background: none; border: none; font-size: 1.5rem;
    cursor: pointer; color: var(--text-3); line-height: 1; padding: 0;
  }
  .modal-close-btn:hover { color: var(--text); }
  .export-textarea {
    flex: 1;
    padding: 1rem 1.4rem;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.74rem;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    overflow-y: auto;
    white-space: pre;
    line-height: 1.7;
    min-height: 260px;
  }
  .export-modal-actions {
    flex-direction: row;
    justify-content: flex-end;
    padding: 0.75rem 1.4rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .export-hist-btn {
    position: absolute;
    top: 0.85rem;
    right: 1rem;
    font-size: 0.73rem;
    padding: 0.25rem 0.7rem;
    height: auto;
    line-height: 1.6;
  }

  /* ── Bulk generate row ── */
  .bulk-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }
  .bulk-row input[type="number"] {
    width: 4.5rem;
    min-height: 36px;
    font-size: 0.9rem;
    padding: 0.35rem 0.6rem;
    text-align: center;
  }
  .bulk-row .btn {
    min-height: 36px;
    font-size: 0.84rem;
    padding: 0.35rem 0.9rem;
  }
  .bulk-label {
    font-size: 0.84rem;
    color: var(--text-3);
    white-space: nowrap;
  }

  /* ── Toggle switch ── */
  .toggle-row { justify-content: space-between; }
  .toggle { display: flex; align-items: center; cursor: pointer; flex-shrink: 0; }
  .toggle input { display: none; }
  .toggle-track {
    width: 42px; height: 24px;
    background: var(--border);
    border-radius: 999px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle input:checked + .toggle-track { background: var(--primary); }
  .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

  /* ── Standings panel ── */
  .standings-card { margin-bottom: 1rem; }

  .standings-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.1rem;
  }
  .standings-card-header .card-title { margin-bottom: 0; }

  .expand-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.28rem 0.65rem;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text-3);
    cursor: pointer;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    transition: all 0.15s;
    touch-action: manipulation;

    font-family: inherit;
  }
  .expand-btn:hover,
  .expand-btn.open { border-color: var(--primary); color: var(--primary); }

  /* ── H2H matrix ── */
  .h2h-wrap {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .h2h-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .h2h-table {
    border-collapse: separate;

  .h2h-table thead th {

  .h2h-col-label {

  .h2h-cell {
    border-radius: 6px;
    padding: 0.3rem 0.55rem;

    font-weight: 600;

  .h2h-cell.self { color: var(--text-3); }
  .h2h-cell.h2h-blank { background: transparent !important; min-width: 0; padding: 0; }
  .h2h-against-label { text-align: center; padding-bottom: 0.2rem !important; }

  .h2h-legend {
    display: flex;
    gap: 1.25rem;
    margin-top: 0.7rem;
    font-size: 0.7rem;
    color: var(--text-3);

  .legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .legend-swatch {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;

  .stat-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;

  .stat-row:last-child { border-bottom: none; }

  .stat-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    min-width: 5.5rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

  .stat-bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 999px;
    position: relative;
    overflow: hidden;

  .stat-bar-win {
    position: absolute;
    left: 0; top: 0; bottom: 0;

    position: absolute;

  .stat-nums {

  }
  .stat-nums .w { color: #22c55e; }
  .stat-nums .l { color: #f87171; }

  /* ── Score inputs on court cards ──
     Mirror the matchup-row flex proportions exactly so inputs sit

  .score-section {
    display: flex;
    align-items: center;
    gap: 0.5rem;

  .score-input::-webkit-inner-spin-button,
  .score-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .score-input:focus { border-color: var(--primary); outline: none; }

  /* Separator spans the same fixed width as .vs-badge so columns align */
  .score-sep {
    width: 2.1rem;
    flex-shrink: 0;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;

  .score-input.score-win { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
  .score-input.score-lose { border-color: #fca5a5; background: #fff1f2; color: #b91c1c; opacity: 0.8; }
  .team-box.team-win { border: 1.5px solid #86efac; background: #f0fdf4; }

  [data-theme="dark"] .score-input.score-win  { border-color: #4ade80; background: #052e16; color: #4ade80; }
  [data-theme="dark"] .score-input.score-lose { border-color: #f87171; background: #1c0505; color: #f87171; }

  /* ── Scorecard history rows ── */
  .history-row-sc {
    flex-direction: column;
    align-items: flex-start;
    gap: 0.35rem;
    padding: 0.7rem 0;

    align-items: center;

    font-size: 0.81rem;

  [data-theme="dark"] .history-sc-team.hw { color: #4ade80; }

  /* Compact score inputs inside history */
  .score-input-sm {

    flex-shrink: 0;

    font-size: 0.82rem;
    font-weight: 700;
    text-align: center;
    padding: 0.1rem 0.2rem;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface);

  .score-input-sm::-webkit-inner-spin-button,
  .score-input-sm::-webkit-outer-spin-button { -webkit-appearance: none; }
  .score-input-sm:focus { border-color: var(--primary); outline: none; }
  .score-input-sm.score-win  { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
  .score-input-sm.score-lose { border-color: #fca5a5; background: #fff1f2; color: #b91c1c; opacity: 0.8; }
  [data-theme="dark"] .score-input-sm.score-win  { border-color: #4ade80; background: #052e16; color: #4ade80; }
  [data-theme="dark"] .score-input-sm.score-lose { border-color: #f87171; background: #1c0505; color: #f87171; }
  .score-sep-sm {
    flex-shrink: 0;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-3);
  }

  /* ── Mobile ── */
  @media (max-width: 520px) {
    header { padding: 0.85rem 1rem; }
    .container { padding: 0.75rem; }
    .card { padding: 1rem; }

    .setting-row { flex-direction: column; align-items: flex-start; gap: 0.35rem; }
    .setting-row input[type="number"] { width: 100%; }

    .round-header { flex-wrap: wrap; gap: 0.5rem; }
    .round-number { font-size: 2.8rem; }
    .round-actions { width: 100%; }
    .round-actions .btn { flex: 1; }
    .setup-actions .btn { width: 100%; }
    .courts-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="2" y="4" width="16" height="12" rx="1.5" stroke="white" stroke-width="1.5"/>
      <line x1="10" y1="4" x2="10" y2="16" stroke="white" stroke-width="1.5"/>
      <line x1="2" y1="10" x2="18" y2="10" stroke="white" stroke-width="1"/>
    </svg>
  </div>
  <div class="header-title">
    <strong>Matchup Generator</strong>
    <span>easy scheduling for every round</span>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"></button>
</header>

<div class="container">

  <!-- SETUP -->
  <div id="setup">
    <div class="card">
      <div class="card-title">Settings</div>
      <div class="setting-row">
        <label for="teamSize">Players per team (N)</label>
        <input type="number" id="teamSize" value="2" min="1" max="10" oninput="updateCourtsMax()">
      </div>
      <div class="setting-row">
        <label for="numCourts">Number of courts</label>
        <input type="number" id="numCourts" value="1" min="1" max="1">
      </div>
      <div class="setting-row toggle-row">
        <label for="scorecardEnabled">Enable Scorecard</label>
        <label class="toggle">
          <input type="checkbox" id="scorecardEnabled">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <label for="seedInput">Session seed</label>
        <div class="seed-input-group">
          <input type="text" id="seedInput" class="seed-text-input" placeholder="Auto" maxlength="12" autocomplete="off" spellcheck="false" oninput="checkCasualsSeed()">
          <button class="btn btn-ghost seed-refresh" onclick="refreshSeed()" title="Generate new seed">↻</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Players</div>
      <div class="player-chips" id="playerChips"></div>
      <div class="input-row">
        <input type="text" id="playerInput" placeholder="Player name" maxlength="40" autocomplete="off">
        <button class="btn btn-secondary" onclick="addPlayer()">Add</button>
      </div>
      <div class="setup-actions">
        <button class="btn btn-primary" onclick="startGame()">Start</button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" style="display:none">
    <div class="card standings-card" id="standingsPanel" style="display:none">
      <div class="standings-card-header">
        <div class="card-title">Standings</div>
        <button class="expand-btn" id="h2hToggle" onclick="toggleH2H()">Head to head ▶</button>
      </div>
      <div id="standingsContent"></div>
      <div id="h2hSection" style="display:none"></div>
    </div>
    <div class="card">
      <div class="round-header">
        <div class="round-meta">
          <div class="round-label">Round</div>
          <div class="round-number" id="roundNumber">1</div>
        </div>
        <div class="round-actions">
          <button class="btn btn-secondary" onclick="openResetModal()">Reset</button>
          <button class="btn btn-primary" onclick="nextRound()">Next Round</button>
        </div>
      </div>
      <div class="bulk-row">
        <span class="bulk-label">Generate</span>
        <input type="number" id="bulkCount" value="5" min="1" max="99">
        <span class="bulk-label">rounds</span>
        <button class="btn btn-secondary" onclick="generateBulk()">Go</button>
        <span class="seed-badge" id="activeSeedBadge"></span>
      </div>
      <div class="courts-grid" id="courtsGrid"></div>
      <div id="restingDisplay"></div>
    </div>

    <div class="card" style="position:relative">
      <button class="btn btn-secondary export-hist-btn" onclick="exportSession()">Export</button>
      <details open>
        <summary>Round History</summary>
        <div class="history-list" id="historyList"></div>
      </details>
    </div>
  </div>

</div>

<!-- Export modal -->
<div class="modal-backdrop" id="exportModal" onclick="handleExportBackdropClick(event)">
  <div class="modal export-modal">
    <div class="export-modal-header">
      <div class="modal-title">Session Export</div>
      <button class="modal-close-btn" onclick="closeExport()">×</button>
    </div>
    <textarea id="exportText" class="export-textarea" readonly spellcheck="false"></textarea>
    <div class="modal-actions export-modal-actions">
      <button class="btn btn-primary" onclick="copyExport(event)">Copy to clipboard</button>
      <button class="btn btn-ghost" onclick="closeExport()">Close</button>
    </div>
  </div>
</div>

<!-- Reset confirmation modal -->
<div class="modal-backdrop" id="resetModal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-title">Reset the session?</div>
    <div class="modal-body">All rounds and stats will be cleared. This can't be undone.</div>
    <div class="modal-actions">
      <button class="btn btn-warm" onclick="closeResetModal()">No, keep playing</button>
      <button class="btn btn-ghost" onclick="confirmReset()">Yes, reset</button>
    </div>
  </div>
</div>

<script>
const state = {
  players: [],
  n: 2,
  courts: 1,
  scorecard: false,
  seed: '',
  currentRound: 0,
  rounds: [],
  usedMatchups: new Set(),
  stats: {}
}

function initStats(name) {
  state.stats[name] = {
    roundsPlayed: 0,
    restCount: 0,
    lastRestRound: -999,
    teammates: {},
    opponents: {},
    winsAgainst: {},
    wins: 0,
    losses: 0,
    draws: 0,
    pointsFor: 0,
    pointsAgainst: 0
  }
}

// --- Seeded RNG ---

function mulberry32(seed) {
  return () => {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed)
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t
    return ((t ^ t >>> 14) >>> 0) / 4294967296
  }
}

function hashSeed(str) {
  let h = 0x811c9dc5
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i)
    h = Math.imul(h, 0x01000193) >>> 0
  }
  return h
}

function randomSeed() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
  let s = ''
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)]
  return s
}

function seededShuffle(arr, rng) {
  const a = [...arr]
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]]
  }
  return a
}

function refreshSeed() {
  document.getElementById('seedInput').value = randomSeed()
}

function checkCasualsSeed() {
  const raw = document.getElementById('seedInput').value.trim().toLowerCase()
  if (raw !== 'casuals') return
  const enc = ['2d0406010e02', '2b00121b00', '35081d1a1504', '20000119']
  const names = enc.map(h => h.match(/.{2}/g).map((b, i) =>
    String.fromCharCode(parseInt(b, 16) ^ raw.charCodeAt(i % raw.length))
  ).join(''))
  for (const name of names) {
    if (!state.players.includes(name)) {
      state.players.push(name)
      initStats(name)
    }
  }
  updateCourtsMax()
  renderSetup()
}

// --- Combinatorics ---

function combinations(arr, k) {
  if (k === 0) return [[]]
  if (arr.length < k) return []
  const [head, ...tail] = arr
  return [
    ...combinations(tail, k - 1).map(c => [head, ...c]),
    ...combinations(tail, k)
  ]
}

function matchupKey(t1, t2) {
  const a = [...t1].sort().join('\x00')
  const b = [...t2].sort().join('\x00')
  return a <= b ? `${a}||${b}` : `${b}||${a}`
}

function getValidMatchups(players, n) {
  const teams = combinations(players, n)
  const result = []
  for (let i = 0; i < teams.length; i++) {
    const set = new Set(teams[i])
    for (let j = i + 1; j < teams.length; j++) {
      if (!teams[j].some(p => set.has(p))) {
        result.push([teams[i], teams[j]])
      }
    }
  }
  return result
}

// --- Rest Rotation ---

function selectResting(players, n, round) {
  const courts = state.courts
  const restCount = players.length - courts * 2 * n
  if (restCount <= 0) return []

  const restedLastRound = p => state.stats[p].lastRestRound === round - 1
  const netRounds = p => state.stats[p].roundsPlayed - state.stats[p].restCount
  const byNetDesc = (a, b) => netRounds(b) - netRounds(a)

  const canRest = players.filter(p => !restedLastRound(p)).sort(byNetDesc)
  let resting = canRest.slice(0, restCount)

  if (resting.length < restCount) {
    const forced = players.filter(restedLastRound).sort(byNetDesc)
    resting = [...resting, ...forced.slice(0, restCount - resting.length)]
  }

  return resting
}

// --- Matchup Scoring ---

function scoreMatchup(t1, t2) {
  let s = 0
  if (state.usedMatchups.has(matchupKey(t1, t2))) s += 1000
  for (const p of t1) {
    for (const q of t2) {
      s += (state.stats[p].opponents[q] || 0) * 5
    }
  }
  return s
}

// --- Round Generation (backtracking) ---

function generateMatchups(activePlayers, n) {
  const courts = state.courts
  if (courts === 0) return []

  const pool = getValidMatchups(activePlayers, n)
  if (pool.length === 0) return []

  pool.sort((a, b) => scoreMatchup(a[0], a[1]) - scoreMatchup(b[0], b[1]))
  if (pool.length > 500) pool.length = 500

  let bestRound = null
  let bestScore = Infinity

  function backtrack(courtIdx, usedPlayers, current, score) {
    if (courtIdx === courts) {
      if (score < bestScore) {
        bestScore = score
        bestRound = current.map(([t1, t2]) => [[...t1], [...t2]])
      }
      return
    }
    for (const [t1, t2] of pool) {
      if ([...t1, ...t2].some(p => usedPlayers.has(p))) continue
      const s = scoreMatchup(t1, t2)
      if (score + s >= bestScore) continue
      for (const p of [...t1, ...t2]) usedPlayers.add(p)
      current.push([t1, t2])
      backtrack(courtIdx + 1, usedPlayers, current, score + s)
      current.pop()
      for (const p of [...t1, ...t2]) usedPlayers.delete(p)
    }
  }

  backtrack(0, new Set(), [], 0)
  return bestRound ?? []
}

// --- State Updates ---

function applyRound(matchups, resting, round) {
  for (const p of resting) {
    state.stats[p].restCount++
    state.stats[p].lastRestRound = round
  }
  for (const [t1, t2] of matchups) {
    state.usedMatchups.add(matchupKey(t1, t2))
    for (const p of [...t1, ...t2]) state.stats[p].roundsPlayed++
    for (const team of [t1, t2]) {
      for (let i = 0; i < team.length; i++) {
        for (let j = i + 1; j < team.length; j++) {
          state.stats[team[i]].teammates[team[j]] = (state.stats[team[i]].teammates[team[j]] || 0) + 1
          state.stats[team[j]].teammates[team[i]] = (state.stats[team[j]].teammates[team[i]] || 0) + 1
        }
      }
    }
    for (const p of t1) {
      for (const q of t2) {
        state.stats[p].opponents[q] = (state.stats[p].opponents[q] || 0) + 1
        state.stats[q].opponents[p] = (state.stats[q].opponents[p] || 0) + 1
      }
    }
  }
}

// --- UI Actions ---

function updateCourtsMax() {
  const n = parseInt(document.getElementById('teamSize').value) || 2
  const max = Math.max(1, Math.floor(state.players.length / (2 * n)))
  const el = document.getElementById('numCourts')
  el.max = max
  if (parseInt(el.value) > max) el.value = max
}

function addPlayer() {
  const input = document.getElementById('playerInput')
  const name = input.value.trim()
  if (!name || state.players.includes(name)) { input.focus(); return }
  state.players.push(name)
  initStats(name)
  input.value = ''
  renderSetup()
  updateCourtsMax()
  input.focus()
}

function removePlayer(name) {
  state.players = state.players.filter(p => p !== name)
  delete state.stats[name]
  renderSetup()
  updateCourtsMax()
}

function startGame() {
  state.n = parseInt(document.getElementById('teamSize').value) || 2
  state.courts = Math.min(
    parseInt(document.getElementById('numCourts').value) || 1,
    Math.floor(state.players.length / (2 * state.n))
  )
  state.scorecard = document.getElementById('scorecardEnabled').checked
  if (state.players.length < 2 * state.n) {
    alert(`Need at least ${2 * state.n} players for ${state.n}v${state.n}.`)
    return
  }
  // Apply seed: sort alphabetically (order-independent) then shuffle deterministically
  const rawSeed = document.getElementById('seedInput').value.trim().toUpperCase() || randomSeed()
  state.seed = rawSeed
  document.getElementById('seedInput').value = rawSeed
  const rng = mulberry32(hashSeed(rawSeed))
  state.players = seededShuffle([...state.players].sort(), rng)
  document.getElementById('activeSeedBadge').innerHTML = `seed: <strong>${esc(rawSeed)}</strong>`

  document.getElementById('standingsPanel').style.display = state.scorecard ? 'block' : 'none'
  document.getElementById('setup').style.display = 'none'
  document.getElementById('game').style.display = 'block'
  nextRound()
}

function openResetModal() {
  document.getElementById('resetModal').classList.add('open')
}

function closeResetModal() {
  document.getElementById('resetModal').classList.remove('open')
}

function handleBackdropClick(e) {
  if (e.target === e.currentTarget) closeResetModal()
}

function confirmReset() {
  closeResetModal()
  state.currentRound = 0
  state.rounds = []
  state.usedMatchups = new Set()
  for (const p of state.players) initStats(p)
  document.getElementById('standingsPanel').style.display = 'none'
  document.getElementById('game').style.display = 'none'
  document.getElementById('setup').style.display = 'block'
}

function generateBulk() {
  const count = Math.max(1, parseInt(document.getElementById('bulkCount').value) || 1)
  for (let i = 0; i < count; i++) nextRound()
}

function nextRound() {
  const round = ++state.currentRound
  const resting = selectResting(state.players, state.n, round)
  const active = state.players.filter(p => !resting.includes(p))
  const matchups = generateMatchups(active, state.n)
  applyRound(matchups, resting, round)
  state.rounds.push({ round, matchups, resting })
  renderGame()
}

// --- Scorecard ---

function handleScore(roundIdx, courtIdx, teamIdx, value) {
  const round = state.rounds[roundIdx]
  if (!round) return
  if (!round.scores) round.scores = round.matchups.map(() => [null, null])
  round.scores[courtIdx][teamIdx] = value === '' ? null : Number(value)
  recalculateWinLoss()
  renderGame()
}

function recalculateWinLoss() {
  for (const p of state.players) {
    state.stats[p].wins = 0
    state.stats[p].losses = 0
    state.stats[p].draws = 0
    state.stats[p].winsAgainst = {}
    state.stats[p].pointsFor = 0
    state.stats[p].pointsAgainst = 0
  }
  for (const round of state.rounds) {
    if (!round.scores) continue
    round.matchups.forEach(([t1, t2], i) => {
      const sc = round.scores[i]
      if (!sc || sc[0] === null || sc[1] === null) return
      const [s1, s2] = sc
      const inc = (obj, key) => { obj[key] = (obj[key] || 0) + 1 }
      t1.forEach(p => { if (state.stats[p]) { state.stats[p].pointsFor += s1; state.stats[p].pointsAgainst += s2 } })
      t2.forEach(p => { if (state.stats[p]) { state.stats[p].pointsFor += s2; state.stats[p].pointsAgainst += s1 } })
      if (s1 > s2) {
        t1.forEach(p => { if (state.stats[p]) { state.stats[p].wins++; t2.forEach(q => inc(state.stats[p].winsAgainst, q)) } })
        t2.forEach(p => state.stats[p] && state.stats[p].losses++)
      } else if (s2 > s1) {
        t2.forEach(p => { if (state.stats[p]) { state.stats[p].wins++; t1.forEach(q => inc(state.stats[p].winsAgainst, q)) } })
        t1.forEach(p => state.stats[p] && state.stats[p].losses++)
      } else {
        ;[...t1, ...t2].forEach(p => state.stats[p] && state.stats[p].draws++)
      }
    })
  }
}

let h2hOpen = false

function toggleH2H() {
  h2hOpen = !h2hOpen
  const btn = document.getElementById('h2hToggle')
  const sec = document.getElementById('h2hSection')
  btn.classList.toggle('open', h2hOpen)
  btn.textContent = h2hOpen ? 'Head to head ▼' : 'Head to head ▶'
  sec.style.display = h2hOpen ? 'block' : 'none'
  renderH2H()
}

function renderH2H() {
  if (!h2hOpen || !state.scorecard) return
  const players = state.players
  const n = players.length
  const abbr = name => name.length > 9 ? name.slice(0, 8) + '…' : name

  // Collect win counts from upper-triangle cells that have data for relative scaling
  const allWins = []
  for (let i = 0; i < n - 1; i++) {
    for (let j = i + 1; j < n; j++) {
      const w = state.stats[players[i]].winsAgainst[players[j]] || 0
      const l = state.stats[players[j]].winsAgainst[players[i]] || 0
      if (w + l > 0) allWins.push(w)
    }
  }
  const maxW = allWins.length ? Math.max(...allWins) : 0
  const minW = allWins.length ? Math.min(...allWins) : 0

  const cellColor = wins => {
    if (maxW === minW) return maxW === 0 ? 'transparent' : 'rgba(148,163,184,0.25)'
    const t = (wins - minW) / (maxW - minW)
    if (t >= 0.5) return `rgba(34,197,94,${(0.15 + (t - 0.5) * 2 * 0.6).toFixed(2)})`
    return `rgba(248,113,113,${(0.15 + (0.5 - t) * 2 * 0.6).toFixed(2)})`
  }

  const colHeaders = players.map(q =>
    `<th class="h2h-col-label" title="${esc(q)}">${esc(abbr(q))}</th>`
  ).join('')

  // Upper triangle only — last player has no row to show
  const bodyRows = players.slice(0, -1).map((p, i) => {
    const cells = players.map((q, j) => {
      if (j <= i) return `<td class="h2h-cell h2h-blank"></td>`
      const wins   = state.stats[p].winsAgainst[q] || 0
      const losses = state.stats[q].winsAgainst[p] || 0
      const hasData = wins + losses > 0
      return `<td class="h2h-cell" style="background:${hasData ? cellColor(wins) : 'transparent'}">${hasData ? `${wins}–${losses}` : '–'}</td>`
    }).join('')
    return `<tr><td class="h2h-cell h2h-row-label">${esc(p)}</td>${cells}</tr>`
  }).join('')

  document.getElementById('h2hSection').innerHTML = `
    <div class="h2h-wrap">
      <div class="h2h-scroll">
        <table class="h2h-table">
          <thead>
            <tr><th></th><th colspan="${n}" class="h2h-against-label">Against</th></tr>
            <tr><th></th>${colHeaders}</tr>
          </thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
    </div>`
}

function renderStandings() {
  if (!state.scorecard) return
  const sorted = [...state.players].sort((a, b) => {
    const sa = state.stats[a], sb = state.stats[b]
    if (sb.wins !== sa.wins) return sb.wins - sa.wins
    if (sa.losses !== sb.losses) return sa.losses - sb.losses
    return a.localeCompare(b)
  })
  document.getElementById('standingsContent').innerHTML = sorted.map(p => {
    const s = state.stats[p]
    const gp = s.roundsPlayed
    const winPct  = gp > 0 ? (s.wins   / gp * 100).toFixed(1) : 0
    const lossPct = gp > 0 ? (s.losses / gp * 100).toFixed(1) : 0
    return `
      <div class="stat-row">
        <div class="stat-name">${esc(p)}</div>
        <div class="stat-bar-track">
          <div class="stat-bar-win"  style="width:${winPct}%"></div>
          <div class="stat-bar-loss" style="width:${lossPct}%"></div>
        </div>
        <div class="stat-nums">
          <span class="w">${s.wins}W</span> · <span class="l">${s.losses}L</span>${s.draws ? ` · ${s.draws}D` : ''} · ${gp}GP · ${s.restCount}R · <span class="w">${s.pointsFor}F</span> · <span class="l">${s.pointsAgainst}A</span>
        </div>
      </div>`
  }).join('')
  renderH2H()
}

// --- Rendering ---

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function renderSetup() {
  document.getElementById('playerChips').innerHTML = state.players.map(name =>
    `<span class="chip">${esc(name)}<button class="chip-remove" data-name="${esc(name)}" onclick="removePlayer(this.dataset.name)" title="Remove">×</button></span>`
  ).join('')
}

function renderGame() {
  const currentRound = state.rounds[state.rounds.length - 1]
  const { round, matchups, resting } = currentRound
  const roundScores = currentRound.scores || []

  document.getElementById('roundNumber').textContent = round

  const curRoundIdx = state.rounds.length - 1

  document.getElementById('courtsGrid').innerHTML = matchups.map(([t1, t2], i) => {
    const [s1, s2] = roundScores[i] || [null, null]
    const both = s1 !== null && s2 !== null
    const t1Won = both && s1 > s2
    const t2Won = both && s2 > s1
    const scoreSection = state.scorecard ? `
      <div class="score-section">
        <input type="number" class="score-input${t1Won ? ' score-win' : both ? ' score-lose' : ''}"
          min="0" value="${s1 !== null ? s1 : ''}" placeholder="—"
          onchange="handleScore(${curRoundIdx}, ${i}, 0, this.value)">
        <div class="score-sep">–</div>
        <input type="number" class="score-input${t2Won ? ' score-win' : both ? ' score-lose' : ''}"
          min="0" value="${s2 !== null ? s2 : ''}" placeholder="—"
          onchange="handleScore(${curRoundIdx}, ${i}, 1, this.value)">
      </div>` : ''
    return `
    <div class="court-card">
      <div class="court-header">
        <div class="court-dot"></div>
        <div class="court-label">Court ${i + 1}</div>
      </div>
      <div class="court-body">
        <div class="matchup-row">
          <div class="team-box${t1Won ? ' team-win' : t2Won ? ' team-lose' : ''}">${t1.map(esc).join('<br>')}</div>
          <div class="vs-badge">VS</div>
          <div class="team-box${t2Won ? ' team-win' : t1Won ? ' team-lose' : ''}">${t2.map(esc).join('<br>')}</div>
        </div>
        ${scoreSection}
      </div>
    </div>`
  }).join('')

  renderStandings()

  document.getElementById('restingDisplay').innerHTML = resting.length
    ? `<div class="resting-notice"><span class="resting-icon">⏸</span> Resting: <strong>${resting.map(esc).join(', ')}</strong></div>`
    : ''

  document.getElementById('historyList').innerHTML = state.rounds.slice().reverse().map(r => {
    const rIdx = r.round - 1
    const sc = r.scores || []

    if (state.scorecard) {
      const matchupRows = r.matchups.map(([t1, t2], i) => {
        const [s1, s2] = sc[i] || [null, null]
        const both = s1 !== null && s2 !== null
        const t1Won = both && s1 > s2
        const t2Won = both && s2 > s1
        return `
          <div class="history-sc-matchup">
            <span class="history-sc-team${t1Won ? ' hw' : t2Won ? ' hl' : ''}">${t1.map(esc).join(' & ')}</span>
            <input type="number" class="score-input-sm${t1Won ? ' score-win' : both ? ' score-lose' : ''}"
              min="0" value="${s1 !== null ? s1 : ''}" placeholder="—"
              onchange="handleScore(${rIdx}, ${i}, 0, this.value)">
            <span class="score-sep-sm">–</span>
            <input type="number" class="score-input-sm${t2Won ? ' score-win' : both ? ' score-lose' : ''}"
              min="0" value="${s2 !== null ? s2 : ''}" placeholder="—"
              onchange="handleScore(${rIdx}, ${i}, 1, this.value)">
            <span class="history-sc-team${t2Won ? ' hw' : t1Won ? ' hl' : ''}">${t2.map(esc).join(' & ')}</span>
          </div>`
      }).join('')
      return `
        <div class="history-row history-row-sc">
          <div class="history-sc-header">
            <span class="history-pill">R${r.round}</span>
            ${r.resting.length ? `<span class="history-rest">rest: ${r.resting.map(esc).join(', ')}</span>` : ''}
          </div>
          ${matchupRows}
        </div>`
    }

    return `
      <div class="history-row">
        <span class="history-pill">R${r.round}</span>
        ${r.matchups.map(([t1, t2]) => `${t1.join(' & ')} vs ${t2.join(' & ')}`).join(' · ')}
        ${r.resting.length ? `<span class="history-rest">· rest: ${r.resting.map(esc).join(', ')}</span>` : ''}
      </div>`
  }).join('')
}

document.getElementById('playerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPlayer()
})

}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme')
  setTheme(current === 'dark' ? 'light' : 'dark')
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme)
  localStorage.setItem('theme', theme)
  const btn = document.getElementById('themeToggle')
  btn.innerHTML = ICONS[theme]
  btn.title = theme === 'dark' ? 'Switch to light mode' : 'Solarpunk dark mode'
}

// Sync button icon with whatever theme was set by the head script
setTheme(document.documentElement.getAttribute('data-theme') || 'light')

// --- Export ---

function exportSession() {
  const date = new Date()
  const dateStr = date.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
  const timeStr = date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
  const div = '─'.repeat(48)
  const lines = []

  lines.push('DOUBLES SESSION')
  lines.push(`${dateStr} at ${timeStr}`)
  lines.push(`Players (${state.players.length}): ${state.players.join(', ')}`)
  lines.push(`Format: ${state.n}v${state.n} · ${state.courts} court${state.courts !== 1 ? 's' : ''}${state.scorecard ? ' · Scorecard' : ''} · Seed: ${state.seed}`)
  lines.push('')

  for (const r of state.rounds) {
    lines.push(div)
    lines.push(`ROUND ${r.round}`)
    const sc = r.scores || []
    r.matchups.forEach(([t1, t2], i) => {
      const [s1, s2] = sc[i] || [null, null]
      const score = s1 !== null && s2 !== null ? `  [${s1} – ${s2}]` : ''
      lines.push(`  ${t1.join(' & ')} vs ${t2.join(' & ')}${score}`)
    })
    if (r.resting.length) lines.push(`  Resting: ${r.resting.join(', ')}`)
    lines.push('')
  }

  if (state.scorecard && state.players.length > 0) {
    lines.push(div)
    lines.push('STANDINGS')
    lines.push('')
    const sorted = [...state.players].sort((a, b) => {
      const sa = state.stats[a], sb = state.stats[b]
      if (sb.wins !== sa.wins) return sb.wins - sa.wins
      if (sa.losses !== sb.losses) return sa.losses - sb.losses
      return a.localeCompare(b)
    })
    const nw = Math.max(...sorted.map(p => p.length), 6)
    const rn = (n, w) => String(n).padStart(w)
    lines.push(`  ${'#'.padEnd(3)}  ${'Player'.padEnd(nw)}   W    L    D   GP    R       F       A`)
    lines.push(`  ${'─'.repeat(nw + 42)}`)
    sorted.forEach((p, idx) => {
      const s = state.stats[p]
      lines.push(`  ${String(idx + 1).padEnd(3)}  ${p.padEnd(nw)}  ${rn(s.wins,3)}  ${rn(s.losses,3)}  ${rn(s.draws,3)}  ${rn(s.roundsPlayed,3)}  ${rn(s.restCount,3)}  ${rn(s.pointsFor,6)}  ${rn(s.pointsAgainst,6)}`)
    })
    lines.push('')
  }

  document.getElementById('exportText').value = lines.join('\n')
  document.getElementById('exportModal').classList.add('open')
}

function closeExport() {
  document.getElementById('exportModal').classList.remove('open')
}

function handleExportBackdropClick(e) {
  if (e.target === e.currentTarget) closeExport()
}

function copyExport(e) {
  const text = document.getElementById('exportText').value
  const btn = e.currentTarget
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.getElementById('exportText')
    ta.select()
    document.execCommand('copy')
  })
  const orig = btn.textContent
  btn.textContent = 'Copied!'
  setTimeout(() => { btn.textContent = orig }, 1500)
}
