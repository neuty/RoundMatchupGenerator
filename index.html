<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchup Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    color: white;
    padding: 1rem 2rem;
  }

  header h1 { font-size: 1.2rem; font-weight: 600; }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #6b7280;
    margin-bottom: 1rem;
  }

  input[type="number"], input[type="text"] {
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: #4f46e5; }

  .btn {
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1.1rem;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary { background: #4f46e5; color: white; }
  .btn-primary:hover { background: #4338ca; }
  .btn-secondary { background: #f3f4f6; color: #374151; }
  .btn-secondary:hover { background: #e5e7eb; }

  /* Setup */
  .setting-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }

  .setting-row label { font-size: 0.9rem; min-width: 9rem; }
  .setting-row input[type="number"] { width: 5rem; }

  .player-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    min-height: 2.25rem;
    margin-bottom: 0.75rem;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: #ede9fe;
    color: #4f46e5;
    border-radius: 999px;
    padding: 0.28rem 0.75rem;
    font-size: 0.875rem;
    font-weight: 500;
  }

  .chip-remove {
    background: none;
    border: none;
    color: #6d28d9;
    cursor: pointer;
    font-size: 1.05rem;
    line-height: 1;
    padding: 0;
  }

  .input-row { display: flex; gap: 0.5rem; }
  .input-row input { flex: 1; }

  .setup-actions {
    margin-top: 1.25rem;
    display: flex;
    justify-content: flex-end;
  }

  /* Game */
  .round-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  .round-title { font-size: 1.4rem; font-weight: 700; }

  .round-actions { display: flex; gap: 0.5rem; }

  .courts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .court-card {
    background: #f0fdf4;
    border: 2px solid #bbf7d0;
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }

  .court-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #16a34a;
    margin-bottom: 0.75rem;
  }

  .matchup-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .team-box {
    flex: 1;
    background: white;
    border-radius: 7px;
    padding: 0.45rem 0.7rem;
    text-align: center;
    font-weight: 600;
    font-size: 0.88rem;
    line-height: 1.55;
  }

  .vs { font-size: 0.72rem; font-weight: 700; color: #9ca3af; flex-shrink: 0; }

  .resting-notice {
    margin-top: 0.85rem;
    background: #fefce8;
    border: 1.5px solid #fde68a;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    color: #92400e;
  }

  /* History */
  details summary {
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #6b7280;
    padding: 0.25rem 0;
    user-select: none;
    list-style: none;
  }

  details summary::before { content: '▶  '; font-size: 0.65rem; }
  details[open] summary::before { content: '▼  '; }

  .history-list { margin-top: 0.6rem; }

  .history-row {
    padding: 0.45rem 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 0.84rem;
    color: #374151;
    line-height: 1.5;
  }

  .history-row:last-child { border-bottom: none; }
  .history-round { font-weight: 600; color: #4f46e5; margin-right: 0.5rem; }
  .history-rest { color: #92400e; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>Matchup Generator</h1>
</header>

<div class="container">

  <!-- SETUP -->
  <div id="setup">
    <div class="card">
      <div class="card-title">Settings</div>
      <div class="setting-row">
        <label for="teamSize">Players per team (N)</label>
        <input type="number" id="teamSize" value="2" min="1" max="10">
      </div>
    </div>

    <div class="card">
      <div class="card-title">Players</div>
      <div class="player-chips" id="playerChips"></div>
      <div class="input-row">
        <input type="text" id="playerInput" placeholder="Player name" maxlength="40" autocomplete="off">
        <button class="btn btn-secondary" onclick="addPlayer()">Add</button>
      </div>
      <div class="setup-actions">
        <button class="btn btn-primary" onclick="startGame()">Start</button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" style="display:none">
    <div class="card">
      <div class="round-header">
        <div class="round-title" id="roundTitle">Round 1</div>
        <div class="round-actions">
          <button class="btn btn-secondary" onclick="resetGame()">Reset</button>
          <button class="btn btn-primary" onclick="nextRound()">Next Round</button>
        </div>
      </div>
      <div class="courts-grid" id="courtsGrid"></div>
      <div id="restingDisplay"></div>
    </div>

    <div class="card">
      <details>
        <summary>Round History</summary>
        <div class="history-list" id="historyList"></div>
      </details>
    </div>
  </div>

</div>

<script>
const state = {
  players: [],
  n: 2,
  currentRound: 0,
  rounds: [],
  usedMatchups: new Set(),
  stats: {}
}

function initStats(name) {
  state.stats[name] = {
    roundsPlayed: 0,
    restCount: 0,
    lastRestRound: -999,
    teammates: {},
    opponents: {}
  }
}

// --- Combinatorics ---

function combinations(arr, k) {
  if (k === 0) return [[]]
  if (arr.length < k) return []
  const [head, ...tail] = arr
  return [
    ...combinations(tail, k - 1).map(c => [head, ...c]),
    ...combinations(tail, k)
  ]
}

function matchupKey(t1, t2) {
  const a = [...t1].sort().join('\x00')
  const b = [...t2].sort().join('\x00')
  return a <= b ? `${a}||${b}` : `${b}||${a}`
}

// All valid matchups from a player pool (no overlapping players between teams)
function getValidMatchups(players, n) {
  const teams = combinations(players, n)
  const result = []
  for (let i = 0; i < teams.length; i++) {
    const set = new Set(teams[i])
    for (let j = i + 1; j < teams.length; j++) {
      if (!teams[j].some(p => set.has(p))) {
        result.push([teams[i], teams[j]])
      }
    }
  }
  return result
}

// --- Rest Rotation ---
// Rule: no player rests two rounds in a row (unless unavoidable).
// Among eligible players, those who've played the most net rounds rest next.

function selectResting(players, n, round) {
  const courts = Math.floor(players.length / (2 * n))
  const restCount = players.length - courts * 2 * n
  if (restCount <= 0) return []

  const restedLastRound = p => state.stats[p].lastRestRound === round - 1
  const netRounds = p => state.stats[p].roundsPlayed - state.stats[p].restCount
  const byNetDesc = (a, b) => netRounds(b) - netRounds(a)

  const canRest = players.filter(p => !restedLastRound(p)).sort(byNetDesc)
  let resting = canRest.slice(0, restCount)

  // Fallback: if not enough, pull from those who rested last round
  if (resting.length < restCount) {
    const forced = players.filter(restedLastRound).sort(byNetDesc)
    resting = [...resting, ...forced.slice(0, restCount - resting.length)]
  }

  return resting
}

// --- Matchup Scoring (lower = better) ---
// Penalises repeat matchups heavily, then teammate/opponent repetition.

function scoreMatchup(t1, t2) {
  let s = 0
  if (state.usedMatchups.has(matchupKey(t1, t2))) s += 1000
  for (const team of [t1, t2]) {
    for (let i = 0; i < team.length; i++) {
      for (let j = i + 1; j < team.length; j++) {
        s += (state.stats[team[i]].teammates[team[j]] || 0) * 10
      }
    }
  }
  for (const p of t1) {
    for (const q of t2) {
      s += (state.stats[p].opponents[q] || 0) * 5
    }
  }
  return s
}

// --- Round Generation ---
// Backtracking search over all courts simultaneously.
// Pre-sorts candidates best-first so the first complete solution found is tight,
// enabling aggressive pruning of branches that can't improve on it.

function generateMatchups(activePlayers, n) {
  const courts = Math.floor(activePlayers.length / (2 * n))
  if (courts === 0) return []

  const pool = getValidMatchups(activePlayers, n)
  if (pool.length === 0) return []

  pool.sort((a, b) => scoreMatchup(a[0], a[1]) - scoreMatchup(b[0], b[1]))

  // Cap for very large player counts to bound search time
  if (pool.length > 500) pool.length = 500

  let bestRound = null
  let bestScore = Infinity

  function backtrack(courtIdx, usedPlayers, current, score) {
    if (courtIdx === courts) {
      if (score < bestScore) {
        bestScore = score
        bestRound = current.map(([t1, t2]) => [[...t1], [...t2]])
      }
      return
    }
    for (const [t1, t2] of pool) {
      if ([...t1, ...t2].some(p => usedPlayers.has(p))) continue
      const s = scoreMatchup(t1, t2)
      if (score + s >= bestScore) continue  // prune: can't beat current best
      for (const p of [...t1, ...t2]) usedPlayers.add(p)
      current.push([t1, t2])
      backtrack(courtIdx + 1, usedPlayers, current, score + s)
      current.pop()
      for (const p of [...t1, ...t2]) usedPlayers.delete(p)
    }
  }

  backtrack(0, new Set(), [], 0)
  return bestRound ?? []
}

// --- State Updates ---

function applyRound(matchups, resting, round) {
  for (const p of resting) {
    state.stats[p].restCount++
    state.stats[p].lastRestRound = round
  }
  for (const [t1, t2] of matchups) {
    state.usedMatchups.add(matchupKey(t1, t2))
    for (const p of [...t1, ...t2]) state.stats[p].roundsPlayed++
    for (const team of [t1, t2]) {
      for (let i = 0; i < team.length; i++) {
        for (let j = i + 1; j < team.length; j++) {
          state.stats[team[i]].teammates[team[j]] = (state.stats[team[i]].teammates[team[j]] || 0) + 1
          state.stats[team[j]].teammates[team[i]] = (state.stats[team[j]].teammates[team[i]] || 0) + 1
        }
      }
    }
    for (const p of t1) {
      for (const q of t2) {
        state.stats[p].opponents[q] = (state.stats[p].opponents[q] || 0) + 1
        state.stats[q].opponents[p] = (state.stats[q].opponents[p] || 0) + 1
      }
    }
  }
}

// --- UI Actions ---

function addPlayer() {
  const input = document.getElementById('playerInput')
  const name = input.value.trim()
  if (!name || state.players.includes(name)) { input.focus(); return }
  state.players.push(name)
  initStats(name)
  input.value = ''
  renderSetup()
  input.focus()
}

function removePlayer(name) {
  state.players = state.players.filter(p => p !== name)
  delete state.stats[name]
  renderSetup()
}

function startGame() {
  state.n = parseInt(document.getElementById('teamSize').value) || 2
  if (state.players.length < 2 * state.n) {
    alert(`Need at least ${2 * state.n} players for ${state.n}v${state.n}.`)
    return
  }
  document.getElementById('setup').style.display = 'none'
  document.getElementById('game').style.display = 'block'
  nextRound()
}

function resetGame() {
  state.currentRound = 0
  state.rounds = []
  state.usedMatchups = new Set()
  for (const p of state.players) initStats(p)
  document.getElementById('game').style.display = 'none'
  document.getElementById('setup').style.display = 'block'
}

function nextRound() {
  const round = ++state.currentRound
  const resting = selectResting(state.players, state.n, round)
  const active = state.players.filter(p => !resting.includes(p))
  const matchups = generateMatchups(active, state.n)
  applyRound(matchups, resting, round)
  state.rounds.push({ round, matchups, resting })
  renderGame()
}

// --- Rendering ---

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function renderSetup() {
  document.getElementById('playerChips').innerHTML = state.players.map(name =>
    `<span class="chip">${esc(name)}<button class="chip-remove" onclick="removePlayer(${JSON.stringify(name)})" title="Remove">×</button></span>`
  ).join('')
}

function renderGame() {
  const { round, matchups, resting } = state.rounds[state.rounds.length - 1]

  document.getElementById('roundTitle').textContent = `Round ${round}`

  document.getElementById('courtsGrid').innerHTML = matchups.map(([t1, t2], i) => `
    <div class="court-card">
      <div class="court-label">Court ${i + 1}</div>
      <div class="matchup-row">
        <div class="team-box">${t1.map(esc).join('<br>')}</div>
        <div class="vs">vs</div>
        <div class="team-box">${t2.map(esc).join('<br>')}</div>
      </div>
    </div>
  `).join('')

  document.getElementById('restingDisplay').innerHTML = resting.length
    ? `<div class="resting-notice">Resting this round: <strong>${resting.map(esc).join(', ')}</strong></div>`
    : ''

  document.getElementById('historyList').innerHTML = state.rounds.slice().reverse().map(r => `
    <div class="history-row">
      <span class="history-round">Round ${r.round}</span>
      ${r.matchups.map(([t1, t2]) => `${t1.join(' & ')} vs ${t2.join(' & ')}`).join(' &nbsp;·&nbsp; ')}
      ${r.resting.length ? `<span class="history-rest"> · Rest: ${r.resting.map(esc).join(', ')}</span>` : ''}
    </div>
  `).join('')
}

document.getElementById('playerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPlayer()
})
</script>
</body>
</html>
